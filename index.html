<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineStream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />
    <style>
      :root {
        --red: #e50914;
        --red-dark: #b20710;
        --red-glow: rgba(229, 9, 20, 0.35);
        --bg: #000;
        --bg-surface: #141414;
        --bg-card: #1a1a1a;
        --bg-card-hover: #222;
        --text: #fff;
        --text-muted: #999;
        --text-dim: #666;
        --gold: #f5c518;
        --border: rgba(255,255,255,0.08);
        --header-height: 68px;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html { scroll-behavior: smooth; }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ===== SCROLLBAR ===== */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--red); }

      /* ===== NAVBAR ===== */
      nav {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: var(--header-height);
        z-index: 500;
        display: flex;
        align-items: center;
        padding: 0 4%;
        justify-content: space-between;
        background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
        transition: background 0.3s;
      }
      nav.scrolled {
        background: rgba(20,20,20,0.97);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
      }

      .nav-logo {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.2rem;
        letter-spacing: 3px;
        color: var(--red);
        text-shadow: 0 0 30px var(--red-glow);
        user-select: none;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .nav-search-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 6px;
        padding: 8px 16px;
        transition: all 0.3s;
      }
      .nav-search-wrap:focus-within {
        border-color: var(--red);
        background: rgba(229,9,20,0.08);
        box-shadow: 0 0 0 3px rgba(229,9,20,0.15);
      }
      .nav-search-wrap input {
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 0.875rem;
        width: 220px;
      }
      .nav-search-wrap input::placeholder { color: var(--text-dim); }
      .search-icon { color: var(--text-dim); font-size: 0.9rem; cursor: pointer; }
      .search-icon:hover { color: var(--text); }

      .nav-search-btn {
        padding: 8px 20px;
        background: var(--red);
        color: #fff;
        border: none;
        border-radius: 5px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.5px;
      }
      .nav-search-btn:hover { background: var(--red-dark); transform: translateY(-1px); }

      /* ===== HERO BANNER ===== */
      .hero {
        position: relative;
        height: 82vh;
        min-height: 520px;
        display: flex;
        align-items: flex-end;
        padding: 0 4% 80px;
        overflow: hidden;
        background: #0a0a0a;
      }

      .hero-bg {
        position: absolute;
        inset: 0;
        background: url('https://image.tmdb.org/t/p/original/') center/cover no-repeat;
        transition: opacity 1s ease;
      }
      .hero-bg::after {
        content: '';
        position: absolute;
        inset: 0;
        background:
          linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 60%, transparent 100%),
          linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 40%, transparent 70%);
      }

      .hero-content {
        position: relative;
        z-index: 2;
        max-width: 550px;
        animation: heroReveal 0.8s cubic-bezier(0.22,1,0.36,1) both;
      }

      @keyframes heroReveal {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--red);
        color: #fff;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 5px 12px;
        border-radius: 3px;
        margin-bottom: 18px;
      }

      .hero-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(3rem, 6vw, 5.5rem);
        line-height: 0.95;
        letter-spacing: 2px;
        margin-bottom: 18px;
        text-shadow: 0 4px 30px rgba(0,0,0,0.8);
      }

      .hero-meta {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 18px;
        font-size: 0.9rem;
        color: #ccc;
      }
      .hero-rating { color: var(--gold); font-weight: 700; }
      .hero-dot { width: 4px; height: 4px; border-radius: 50%; background: #555; }

      .hero-desc {
        font-size: 1rem;
        line-height: 1.65;
        color: #ccc;
        margin-bottom: 28px;
        font-weight: 300;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .hero-actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .btn-hero-primary {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 13px 28px;
        background: var(--red);
        color: #fff;
        border: none;
        border-radius: 5px;
        font-family: 'DM Sans', sans-serif;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s;
      }
      .btn-hero-primary:hover { background: var(--red-dark); transform: scale(1.03); }

      .btn-hero-secondary {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 13px 28px;
        background: rgba(255,255,255,0.15);
        color: #fff;
        border: none;
        border-radius: 5px;
        font-family: 'DM Sans', sans-serif;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: all 0.25s;
        border: 1px solid rgba(255,255,255,0.2);
      }
      .btn-hero-secondary:hover { background: rgba(255,255,255,0.25); }

      /* ===== CATEGORY TABS ===== */
      .tabs-bar {
        position: sticky;
        top: var(--header-height);
        z-index: 400;
        background: rgba(0,0,0,0.92);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 0 4%;
        display: flex;
        gap: 0;
        align-items: center;
      }

      .tab-btn {
        padding: 18px 24px;
        background: transparent;
        color: var(--text-muted);
        border: none;
        border-bottom: 2px solid transparent;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.25s;
        white-space: nowrap;
        letter-spacing: 0.3px;
      }
      .tab-btn:hover { color: var(--text); }
      .tab-btn.active {
        color: var(--text);
        border-bottom-color: var(--red);
        font-weight: 600;
      }

      /* ===== MAIN CONTENT ===== */
      .main {
        padding: 40px 4%;
        max-width: 1600px;
        margin: 0 auto;
      }

      /* ===== ERROR / STATUS ===== */
      .status-bar {
        margin-bottom: 28px;
      }
      .error-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: rgba(229,9,20,0.12);
        border: 1px solid rgba(229,9,20,0.4);
        color: #ff6b6b;
        padding: 12px 20px;
        border-radius: 6px;
        font-size: 0.9rem;
      }

      /* ===== SECTION HEADER ===== */
      .section-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 22px;
      }
      .section-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.6rem;
        letter-spacing: 1px;
        color: var(--text);
      }
      .section-count {
        font-size: 0.8rem;
        color: var(--text-dim);
        font-weight: 400;
      }

      /* ===== MOVIES GRID ===== */
      .movies-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 6px;
        margin-bottom: 40px;
      }

      .movie-card {
        position: relative;
        border-radius: 4px;
        overflow: hidden;
        background: var(--bg-card);
        cursor: pointer;
        transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
        aspect-ratio: 2/3;
      }

      .movie-card:hover {
        transform: scale(1.06);
        z-index: 10;
        box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 0 1px rgba(229,9,20,0.3);
      }

      .movie-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: opacity 0.3s;
      }

      .movie-card-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
        opacity: 0;
        transition: opacity 0.3s;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 18px 14px 14px;
      }
      .movie-card:hover .movie-card-overlay { opacity: 1; }

      .card-title {
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 5px;
        line-height: 1.3;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .card-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.75rem;
        color: #aaa;
        margin-bottom: 10px;
      }
      .card-rating { color: var(--gold); font-weight: 600; }

      .card-actions {
        display: flex;
        gap: 7px;
      }
      .card-btn {
        flex: 1;
        padding: 7px 0;
        border: none;
        border-radius: 4px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .card-btn-primary {
        background: var(--red);
        color: #fff;
      }
      .card-btn-primary:hover { background: var(--red-dark); }
      .card-btn-secondary {
        background: rgba(255,255,255,0.15);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.2);
      }
      .card-btn-secondary:hover { background: rgba(255,255,255,0.25); }

      .card-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        background: var(--red);
        color: #fff;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 1px;
        padding: 3px 8px;
        border-radius: 3px;
        z-index: 2;
      }

      /* ===== LOADING ===== */
      .loading-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 6px;
        margin-bottom: 40px;
      }
      .skeleton {
        aspect-ratio: 2/3;
        background: #1a1a1a;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }
      .skeleton::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        from { transform: translateX(-100%); }
        to { transform: translateX(100%); }
      }

      /* ===== NO RESULTS ===== */
      .no-results {
        text-align: center;
        padding: 80px 20px;
        color: var(--text-muted);
      }
      .no-results-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.5; }
      .no-results h3 { font-size: 1.5rem; margin-bottom: 8px; color: var(--text); }

      /* ===== PAGINATION ===== */
      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 40px 0 60px;
      }
      .page-btn {
        padding: 10px 22px;
        background: var(--bg-card);
        color: var(--text-muted);
        border: 1px solid var(--border);
        border-radius: 5px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .page-btn:hover:not(:disabled) {
        background: var(--red);
        color: #fff;
        border-color: var(--red);
      }
      .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
      .page-info {
        font-size: 0.85rem;
        color: var(--text-muted);
        min-width: 120px;
        text-align: center;
      }
      .page-info span { color: var(--text); font-weight: 600; }

      /* ===== MODAL ===== */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(8px);
        align-items: center;
        justify-content: center;
        padding: 20px;
        animation: overlayIn 0.25s ease;
      }
      .modal-overlay.show { display: flex; }

      @keyframes overlayIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .modal-box {
        background: #181818;
        border-radius: 8px;
        width: 100%;
        max-width: 900px;
        max-height: 90vh;
        overflow-y: auto;
        position: relative;
        animation: modalSlide 0.35s cubic-bezier(0.22,1,0.36,1) both;
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 40px 100px rgba(0,0,0,0.9);
      }

      @keyframes modalSlide {
        from { opacity: 0; transform: scale(0.92) translateY(30px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }

      .modal-close-btn {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: rgba(0,0,0,0.7);
        border: 1px solid rgba(255,255,255,0.15);
        color: #fff;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        transition: all 0.2s;
      }
      .modal-close-btn:hover {
        background: var(--red);
        border-color: var(--red);
        transform: rotate(90deg);
      }

      .modal-hero {
        position: relative;
        height: 380px;
        overflow: hidden;
        border-radius: 8px 8px 0 0;
      }
      .modal-hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .modal-hero::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(24,24,24,1) 100%);
      }

      .modal-body {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 30px;
        padding: 0 30px 30px;
        margin-top: -80px;
        position: relative;
        z-index: 2;
      }

      .modal-poster-wrap img {
        width: 100%;
        border-radius: 6px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        border: 2px solid rgba(255,255,255,0.08);
        display: block;
      }

      .modal-info { padding-top: 10px; }

      .modal-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.8rem;
        letter-spacing: 1.5px;
        line-height: 1;
        margin-bottom: 14px;
      }

      .modal-pills {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 18px;
        align-items: center;
      }
      .pill {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .pill-red { background: rgba(229,9,20,0.2); color: #ff6b6b; border: 1px solid rgba(229,9,20,0.3); }
      .pill-gray { background: rgba(255,255,255,0.08); color: #aaa; border: 1px solid rgba(255,255,255,0.1); }
      .pill-gold { background: rgba(245,197,24,0.15); color: var(--gold); border: 1px solid rgba(245,197,24,0.3); }

      .modal-rating-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }
      .stars-display { color: var(--gold); letter-spacing: 2px; font-size: 1rem; }
      .rating-num { font-weight: 700; font-size: 1.1rem; }
      .vote-count { color: var(--text-dim); font-size: 0.8rem; }

      .modal-desc {
        font-size: 0.95rem;
        line-height: 1.75;
        color: #bbb;
        margin-bottom: 24px;
        font-weight: 300;
      }

      .modal-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 24px;
      }
      .stat-box {
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 14px;
        text-align: center;
      }
      .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
      .stat-value { font-size: 1rem; font-weight: 700; color: var(--text); }

      .modal-cta {
        display: flex;
        gap: 12px;
      }
      .btn-modal-primary {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 28px;
        background: var(--red);
        color: #fff;
        border: none;
        border-radius: 5px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.3px;
      }
      .btn-modal-primary:hover { background: var(--red-dark); }

      .btn-modal-secondary {
        padding: 12px 22px;
        background: transparent;
        color: var(--text-muted);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 5px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-modal-secondary:hover { border-color: rgba(255,255,255,0.35); color: var(--text); }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        .nav-search-wrap input { width: 140px; }
        .movies-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 4px; }
        .loading-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 4px; }
        .hero { height: 65vh; }
        .modal-body { grid-template-columns: 1fr; gap: 20px; padding: 0 20px 20px; margin-top: 0; }
        .modal-poster-wrap { display: none; }
        .modal-title { font-size: 2rem; }
        .modal-stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .tab-btn { padding: 16px 16px; font-size: 0.8rem; }
      }
    </style>
  </head>
  <body>

    <!-- NAVBAR -->
    <nav id="navbar">
      <div class="nav-logo">🎬 CineStream</div>
      <div class="nav-right">
        <div class="nav-search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Cari film..." />
        </div>
        <button class="nav-search-btn" onclick="searchMovies()">Cari</button>
      </div>
    </nav>

    <!-- HERO -->
    <div class="hero" id="hero">
      <div class="hero-bg" id="heroBg"></div>
      <div class="hero-content" id="heroContent">
        <div class="hero-badge">🔥 Trending Now</div>
        <h1 class="hero-title" id="heroTitle">Memuat Film...</h1>
        <div class="hero-meta">
          <span class="hero-rating" id="heroRating">⭐ 0.0</span>
          <div class="hero-dot"></div>
          <span id="heroYear">—</span>
          <div class="hero-dot"></div>
          <span id="heroLang">—</span>
        </div>
        <p class="hero-desc" id="heroDesc">Memuat konten terbaik untuk Anda...</p>
        <div class="hero-actions">
          <button class="btn-hero-primary" id="heroDetailBtn">▶ Lihat Detail</button>
          <button class="btn-hero-secondary">+ Watchlist</button>
        </div>
      </div>
    </div>

    <!-- CATEGORY TABS -->
    <div class="tabs-bar">
      <button class="tab-btn active" data-fn="getPopularMovies">🔥 Popular</button>
      <button class="tab-btn" data-fn="getTopRatedMovies">⭐ Top Rated</button>
      <button class="tab-btn" data-fn="getUpcomingMovies">📅 Upcoming</button>
      <button class="tab-btn" data-fn="getNowPlayingMovies">🎭 Now Playing</button>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="status-bar" id="statusBar"></div>

      <div class="section-header">
        <h2 class="section-title" id="sectionTitle">Film Popular</h2>
        <span class="section-count" id="sectionCount"></span>
      </div>

      <div id="moviesContainer" class="movies-grid"></div>
      <div id="loadingGrid" class="loading-grid" style="display:none;"></div>
      <div id="noResults" class="no-results" style="display:none;">
        <div class="no-results-icon">🎬</div>
        <h3>Film tidak ditemukan</h3>
        <p>Coba kata kunci yang berbeda</p>
      </div>

      <div class="pagination">
        <button class="page-btn" id="prevBtn" onclick="previousPage()" disabled>← Prev</button>
        <div class="page-info" id="pageInfo">Halaman <span>1</span> / <span>1</span></div>
        <button class="page-btn" id="nextBtn" onclick="nextPage()">Next →</button>
      </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="movieModal">
      <div class="modal-box">
        <button class="modal-close-btn" onclick="closeModal()">✕</button>
        <div class="modal-hero">
          <img id="modalBackdrop" src="" alt="" />
        </div>
        <div class="modal-body">
          <div class="modal-poster-wrap">
            <img id="modalPoster" src="" alt="" />
          </div>
          <div class="modal-info">
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-pills" id="modalPills"></div>
            <div class="modal-rating-row">
              <span class="stars-display" id="modalStars"></span>
              <span class="rating-num" id="modalRatingNum"></span>
              <span class="vote-count" id="modalVoteCount"></span>
            </div>
            <p class="modal-desc" id="modalDesc"></p>
            <div class="modal-stats">
              <div class="stat-box">
                <div class="stat-label">Budget</div>
                <div class="stat-value" id="statBudget">—</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">Revenue</div>
                <div class="stat-value" id="statRevenue">—</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">Durasi</div>
                <div class="stat-value" id="statRuntime">—</div>
              </div>
            </div>
            <div class="modal-cta">
              <button class="btn-modal-primary">▶ Trailer</button>
              <button class="btn-modal-secondary">❤ Simpan</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_KEY = "9c1b336939c3e7529a33392ea789477b";
      const BASE = "https://api.themoviedb.org/3";
      const IMG = "https://image.tmdb.org/t/p";

      let currentPage = 1;
      let currentQuery = "";
      let isSearching = false;
      let currentEndpoint = "/movie/popular";
      let heroMovie = null;

      // ===== NAV SCROLL =====
      window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
      });

      // ===== SEARCH =====
      document.getElementById("searchInput").addEventListener("keypress", e => {
        if (e.key === "Enter") searchMovies();
      });

      function searchMovies() {
        const q = document.getElementById("searchInput").value.trim();
        if (!q) return showStatus("Masukkan nama film untuk dicari", "error");
        currentQuery = q;
        isSearching = true;
        currentPage = 1;
        updateSectionTitle("Hasil: "" + q + """);
        fetchMovies(`/search/movie?query=${encodeURIComponent(q)}`);
      }

      // ===== TABS =====
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          isSearching = false;
          currentPage = 1;
          currentQuery = "";
          document.getElementById("searchInput").value = "";
          const fn = btn.dataset.fn;
          const map = {
            getPopularMovies: ["/movie/popular", "Film Popular"],
            getTopRatedMovies: ["/movie/top_rated", "Top Rated"],
            getUpcomingMovies: ["/movie/upcoming", "Upcoming"],
            getNowPlayingMovies: ["/movie/now_playing", "Now Playing"],
          };
          currentEndpoint = map[fn][0];
          updateSectionTitle(map[fn][1]);
          fetchMovies(currentEndpoint);
        });
      });

      function updateSectionTitle(t) {
        document.getElementById("sectionTitle").textContent = t;
      }

      // ===== FETCH =====
      async function fetchMovies(endpoint) {
        showLoading(true);
        clearStatus();
        try {
          const sep = endpoint.includes("?") ? "&" : "?";
          const url = `${BASE}${endpoint}${sep}api_key=${API_KEY}&page=${currentPage}`;
          const res = await fetch(url);
          if (!res.ok) throw new Error(res.status === 401 ? "API Key tidak valid" : `Error ${res.status}`);
          const data = await res.json();
          renderMovies(data.results);
          updatePagination(data.total_pages);
          if (data.results.length > 0 && !isSearching && currentPage === 1) {
            updateHero(data.results[Math.floor(Math.random() * Math.min(5, data.results.length))]);
          }
          document.getElementById("sectionCount").textContent = data.total_results ? `${data.total_results.toLocaleString()} film` : "";
        } catch (err) {
          showStatus(err.message, "error");
        } finally {
          showLoading(false);
        }
      }

      // ===== HERO =====
      function updateHero(movie) {
        heroMovie = movie;
        const bp = movie.backdrop_path ? `${IMG}/original${movie.backdrop_path}` : "";
        const heroBg = document.getElementById("heroBg");
        if (bp) {
          heroBg.style.backgroundImage = `url(${bp})`;
          heroBg.style.opacity = "1";
        }
        document.getElementById("heroTitle").textContent = movie.title;
        document.getElementById("heroRating").textContent = `⭐ ${movie.vote_average?.toFixed(1)}`;
        document.getElementById("heroYear").textContent = movie.release_date ? new Date(movie.release_date).getFullYear() : "—";
        document.getElementById("heroLang").textContent = movie.original_language?.toUpperCase();
        document.getElementById("heroDesc").textContent = movie.overview || "Tidak ada deskripsi.";
        document.getElementById("heroDetailBtn").onclick = () => getMovieDetails(movie.id);
      }

      // ===== RENDER MOVIES =====
      function renderMovies(movies) {
        const container = document.getElementById("moviesContainer");
        container.innerHTML = "";
        document.getElementById("noResults").style.display = movies.length === 0 ? "flex" : "none";
        container.style.display = movies.length === 0 ? "none" : "grid";
        if (movies.length === 0) {
          document.getElementById("noResults").style.display = "block";
          return;
        }

        movies.forEach((movie, i) => {
          const poster = movie.poster_path ? `${IMG}/w500${movie.poster_path}` : "https://via.placeholder.com/500x750/1a1a1a/555?text=No+Image";
          const year = movie.release_date ? new Date(movie.release_date).getFullYear() : "—";
          const rating = movie.vote_average ? movie.vote_average.toFixed(1) : "—";
          const isTop = i < 3;

          const card = document.createElement("div");
          card.className = "movie-card";
          card.style.animationDelay = `${i * 0.03}s`;
          card.innerHTML = `
            ${isTop ? `<div class="card-badge">TOP ${i + 1}</div>` : ""}
            <img src="${poster}" alt="${movie.title}" loading="lazy" />
            <div class="movie-card-overlay">
              <div class="card-title">${movie.title}</div>
              <div class="card-meta">
                <span class="card-rating">⭐ ${rating}</span>
                <span>${year}</span>
              </div>
              <div class="card-actions">
                <button class="card-btn card-btn-primary" onclick="event.stopPropagation(); getMovieDetails(${movie.id})">Detail</button>
                <button class="card-btn card-btn-secondary" onclick="event.stopPropagation()">+ List</button>
              </div>
            </div>
          `;
          card.addEventListener("click", () => getMovieDetails(movie.id));
          container.appendChild(card);
        });
      }

      // ===== MOVIE DETAIL =====
      async function getMovieDetails(id) {
        try {
          const res = await fetch(`${BASE}/movie/${id}?api_key=${API_KEY}`);
          const data = await res.json();
          showModal(data);
        } catch (e) {
          showStatus("Gagal memuat detail film", "error");
        }
      }

      function showModal(movie) {
        const poster = movie.poster_path ? `${IMG}/w500${movie.poster_path}` : "https://via.placeholder.com/500x750/1a1a1a/555?text=No+Image";
        const backdrop = movie.backdrop_path ? `${IMG}/original${movie.backdrop_path}` : poster;

        document.getElementById("modalBackdrop").src = backdrop;
        document.getElementById("modalPoster").src = poster;
        document.getElementById("modalTitle").textContent = movie.title;
        document.getElementById("modalDesc").textContent = movie.overview || "Tidak ada deskripsi.";

        // Stars
        const stars = Math.round(movie.vote_average / 2);
        document.getElementById("modalStars").textContent = "★".repeat(stars) + "☆".repeat(5 - stars);
        document.getElementById("modalRatingNum").textContent = movie.vote_average?.toFixed(1) + "/10";
        document.getElementById("modalVoteCount").textContent = `(${movie.vote_count?.toLocaleString()} votes)`;

        // Pills
        const pills = document.getElementById("modalPills");
        pills.innerHTML = "";
        if (movie.release_date) pills.innerHTML += `<span class="pill pill-gray">${new Date(movie.release_date).getFullYear()}</span>`;
        if (movie.status) pills.innerHTML += `<span class="pill pill-red">${movie.status}</span>`;
        if (movie.original_language) pills.innerHTML += `<span class="pill pill-gray">${movie.original_language.toUpperCase()}</span>`;
        if (movie.vote_average) pills.innerHTML += `<span class="pill pill-gold">⭐ ${movie.vote_average.toFixed(1)}</span>`;

        // Stats
        document.getElementById("statBudget").textContent = movie.budget > 0 ? "$" + (movie.budget / 1e6).toFixed(0) + "M" : "—";
        document.getElementById("statRevenue").textContent = movie.revenue > 0 ? "$" + (movie.revenue / 1e6).toFixed(0) + "M" : "—";
        document.getElementById("statRuntime").textContent = movie.runtime ? movie.runtime + " min" : "—";

        document.getElementById("movieModal").classList.add("show");
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        document.getElementById("movieModal").classList.remove("show");
        document.body.style.overflow = "";
      }

      document.getElementById("movieModal").addEventListener("click", e => {
        if (e.target === document.getElementById("movieModal")) closeModal();
      });

      window.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

      // ===== LOADING =====
      function showLoading(show) {
        const lg = document.getElementById("loadingGrid");
        const mg = document.getElementById("moviesContainer");
        if (show) {
          mg.style.display = "none";
          lg.style.display = "grid";
          lg.innerHTML = Array.from({length: 20}, () => `<div class="skeleton"></div>`).join("");
        } else {
          lg.style.display = "none";
          mg.style.display = "grid";
        }
      }

      // ===== STATUS =====
      function showStatus(msg, type) {
        document.getElementById("statusBar").innerHTML = `<div class="error-pill">⚠️ ${msg}</div>`;
      }
      function clearStatus() {
        document.getElementById("statusBar").innerHTML = "";
      }

      // ===== PAGINATION =====
      function updatePagination(total) {
        const info = document.getElementById("pageInfo");
        info.innerHTML = `Halaman <span>${currentPage}</span> / <span>${total}</span>`;
        document.getElementById("prevBtn").disabled = currentPage === 1;
        document.getElementById("nextBtn").disabled = currentPage >= total;
      }

      function nextPage() {
        currentPage++;
        window.scrollTo({ top: document.querySelector(".tabs-bar").offsetTop - 70, behavior: "smooth" });
        if (isSearching) fetchMovies(`/search/movie?query=${encodeURIComponent(currentQuery)}`);
        else fetchMovies(currentEndpoint);
      }

      function previousPage() {
        if (currentPage > 1) {
          currentPage--;
          window.scrollTo({ top: document.querySelector(".tabs-bar").offsetTop - 70, behavior: "smooth" });
          if (isSearching) fetchMovies(`/search/movie?query=${encodeURIComponent(currentQuery)}`);
          else fetchMovies(currentEndpoint);
        }
      }

      // ===== INIT =====
      window.addEventListener("load", () => {
        fetchMovies("/movie/popular");
      });
    </script>
  </body>
</html>
