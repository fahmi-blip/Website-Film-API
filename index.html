<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineStream - Movie Database</title>
    <style>
      :root {
        --red: #e50914;
        --red-dark: #b20710;
        --red-glow: rgba(229, 9, 20, 0.35);
        --bg: #000;
        --bg-surface: #141414;
        --bg-card: #1a1a1a;
        --bg-card-hover: #222;
        --text: #fff;
        --text-muted: #999;
        --text-dim: #666;
        --gold: #f5c518;
        --border: rgba(255,255,255,0.08);
        --header-height: 68px;
      }
 
      * { margin: 0; padding: 0; box-sizing: border-box; }
 
      html { scroll-behavior: smooth; }
 
      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }
 
      /* ===== SCROLLBAR ===== */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg); }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--red); }
 
      /* ===== NAVBAR ===== */
      nav {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: var(--header-height);
        z-index: 500;
        display: flex;
        align-items: center;
        padding: 0 4%;
        justify-content: space-between;
        background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
        transition: background 0.3s;
      }
      nav.scrolled {
        background: rgba(20,20,20,0.97);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
      }
 
      .nav-logo {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.2rem;
        letter-spacing: 3px;
        color: var(--red);
        text-shadow: 0 0 30px var(--red-glow);
        user-select: none;
      }
 
      .nav-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }
 
      .nav-search-wrap {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 6px;
        padding: 8px 16px;
        transition: all 0.3s;
      }
      .nav-search-wrap:focus-within {
        border-color: var(--red);
        background: rgba(229,9,20,0.08);
        box-shadow: 0 0 0 3px rgba(229,9,20,0.15);
      }
      .nav-search-wrap input {
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 0.875rem;
        width: 220px;
      }
      .nav-search-wrap input::placeholder { color: var(--text-dim); }
      .search-icon { color: var(--text-dim); font-size: 0.9rem; cursor: pointer; }
      .search-icon:hover { color: var(--text); }
 
      .nav-search-btn {
        padding: 8px 20px;
        background: var(--red);
        color: #fff;
        border: none;
        border-radius: 5px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.5px;
      }
      .nav-search-btn:hover { background: var(--red-dark); transform: translateY(-1px); }
 
      /* ===== HERO BANNER ===== */
      .hero {
        position: relative;
        height: 82vh;
        min-height: 520px;
        display: flex;
        align-items: flex-end;
        padding: 0 4% 80px;
        overflow: hidden;
        background: #0a0a0a;
      }
 
      .hero-bg {
        position: absolute;
        inset: 0;
        background: url('https://image.tmdb.org/t/p/original/') center/cover no-repeat;
        transition: opacity 1s ease;
      }
      .hero-bg::after {
        content: '';
        position: absolute;
        inset: 0;
        background:
          linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 60%, transparent 100%),
          linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 40%, transparent 70%);
      }
 
      .hero-content {
        position: relative;
        z-index: 2;
        max-width: 550px;
        animation: heroReveal 0.8s cubic-bezier(0.22,1,0.36,1) both;
      }
 
      @keyframes heroReveal {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
 
      .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--red);
        color: #fff;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 5px 12px;
        border-radius: 3px;
        margin-bottom: 18px;
      }
 
      .hero-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(3rem, 6vw, 5.5rem);
        line-height: 0.95;
        letter-spacing: 2px;
        margin-bottom: 18px;
        text-shadow: 0 4px 30px rgba(0,0,0,0.8);
      }
 
      .hero-meta {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 18px;
        font-size: 0.9rem;
        color: #ccc;
      }
      .hero-rating { color: var(--gold); font-weight: 700; }
      .hero-dot { width: 4px; height: 4px; border-radius: 50%; background: #555; }
 
      .hero-desc {
        font-size: 1rem;
        line-height: 1.65;
        color: #ccc;
        margin-bottom: 28px;
        font-weight: 300;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
 
      .hero-actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }
 
      .btn-hero-primary {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 13px 28px;
        background: var(--red);
        color: #fff;
        border: none;
        border-radius: 5px;
        font-family: 'DM Sans', sans-serif;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s;
      }
      .btn-hero-primary:hover { background: var(--red-dark); transform: scale(1.03); }
 
      .btn-hero-secondary {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 13px 28px;
        background: rgba(255,255,255,0.15);
        color: #fff;
        border: none;
        border-radius: 5px;
        font-family: 'DM Sans', sans-serif;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: all 0.25s;
        border: 1px solid rgba(255,255,255,0.2);
      }
      .btn-hero-secondary:hover { background: rgba(255,255,255,0.25); }
 
      /* ===== CATEGORY TABS ===== */
      .tabs-bar {
        position: sticky;
        top: var(--header-height);
        z-index: 400;
        background: rgba(0,0,0,0.92);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
        padding: 0 4%;
        display: flex;
        gap: 0;
        align-items: center;
      }
 
      .tab-btn {
        padding: 18px 24px;
        background: transparent;
        color: var(--text-muted);
        border: none;
        border-bottom: 2px solid transparent;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.25s;
        white-space: nowrap;
        letter-spacing: 0.3px;
      }
      .tab-btn:hover { color: var(--text); }
      .tab-btn.active {
        color: var(--text);
        border-bottom-color: var(--red);
        font-weight: 600;
      }
 
      /* ===== MAIN CONTENT ===== */
      .main {
        padding: 40px 4%;
        max-width: 1600px;
        margin: 0 auto;
      }
 
      /* ===== ERROR / STATUS ===== */
      .status-bar {
        margin-bottom: 28px;
      }
      .error-pill {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: rgba(229,9,20,0.12);
        border: 1px solid rgba(229,9,20,0.4);
        color: #ff6b6b;
        padding: 12px 20px;
        border-radius: 6px;
        font-size: 0.9rem;
      }
 
      /* ===== SECTION HEADER ===== */
      .section-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 22px;
      }
      .section-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.6rem;
        letter-spacing: 1px;
        color: var(--text);
      }
      .section-count {
        font-size: 0.8rem;
        color: var(--text-dim);
        font-weight: 400;
      }
 
      /* ===== MOVIES GRID ===== */
      .movies-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 6px;
        margin-bottom: 40px;
      }
 
      .movie-card {
        position: relative;
        border-radius: 4px;
        overflow: hidden;
        background: var(--bg-card);
        cursor: pointer;
        transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
        aspect-ratio: 2/3;
      }
 
      .movie-card:hover {
        transform: scale(1.06);
        z-index: 10;
        box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 0 1px rgba(229,9,20,0.3);
      }
 
      .movie-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: opacity 0.3s;
      }
 
      .movie-card-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
        opacity: 0;
        transition: opacity 0.3s;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 18px 14px 14px;
      }
      .movie-card:hover .movie-card-overlay { opacity: 1; }
 
      .card-title {
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 5px;
        line-height: 1.3;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
 
      .card-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.75rem;
        color: #aaa;
        margin-bottom: 10px;
      }
      .card-rating { color: var(--gold); font-weight: 600; }
 
      .card-actions {
        display: flex;
        gap: 7px;
      }
      .card-btn {
        flex: 1;
        padding: 7px 0;
        border: none;
        border-radius: 4px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .card-btn-primary {
        background: var(--red);
        color: #fff;
      }
      .card-btn-primary:hover { background: var(--red-dark); }
      .card-btn-secondary {
        background: rgba(255,255,255,0.15);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.2);
      }
      .card-btn-secondary:hover { background: rgba(255,255,255,0.25); }
 
      .card-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        background: var(--red);
        color: #fff;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 1px;
        padding: 3px 8px;
        border-radius: 3px;
        z-index: 2;
      }
 
      /* ===== LOADING ===== */
      .loading-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 6px;
        margin-bottom: 40px;
      }
      .skeleton {
        aspect-ratio: 2/3;
        background: #1a1a1a;
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }
      .skeleton::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        from { transform: translateX(-100%); }
        to { transform: translateX(100%); }
      }
 
      /* ===== NO RESULTS ===== */
      .no-results {
        text-align: center;
        padding: 80px 20px;
        color: var(--text-muted);
      }
      .no-results-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.5; }
      .no-results h3 { font-size: 1.5rem; margin-bottom: 8px; color: var(--text); }
 
      /* ===== PAGINATION ===== */
      .pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 40px 0 60px;
      }
      .page-btn {
        padding: 10px 22px;
        background: var(--bg-card);
        color: var(--text-muted);
        border: 1px solid var(--border);
        border-radius: 5px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .page-btn:hover:not(:disabled) {
        background: var(--red);
        color: #fff;
        border-color: var(--red);
      }
      .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
      .page-info {
        font-size: 0.85rem;
        color: var(--text-muted);
        min-width: 120px;
        text-align: center;
      }
      .page-info span { color: var(--text); font-weight: 600; }
 
      /* ===== MODAL ===== */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(0,0,0,0.85);
        backdrop-filter: blur(8px);
        align-items: center;
        justify-content: center;
        padding: 20px;
        animation: overlayIn 0.25s ease;
      }
      .modal-overlay.show { display: flex; }
 
      @keyframes overlayIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
 
      .modal-box {
        background: #181818;
        border-radius: 8px;
        width: 100%;
        max-width: 900px;
        max-height: 90vh;
        overflow-y: auto;
        position: relative;
        animation: modalSlide 0.35s cubic-bezier(0.22,1,0.36,1) both;
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 40px 100px rgba(0,0,0,0.9);
      }
 
      @keyframes modalSlide {
        from { opacity: 0; transform: scale(0.92) translateY(30px); }
        to { opacity: 1; transform: scale(1) translateY(0); }
      }
 
      .modal-close-btn {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: rgba(0,0,0,0.7);
        border: 1px solid rgba(255,255,255,0.15);
        color: #fff;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        transition: all 0.2s;
      }
      .modal-close-btn:hover {
        background: var(--red);
        border-color: var(--red);
        transform: rotate(90deg);
      }
 
      .modal-hero {
        position: relative;
        height: 380px;
        overflow: hidden;
        border-radius: 8px 8px 0 0;
      }
      .modal-hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .modal-hero::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(24,24,24,1) 100%);
      }
 
      .modal-body {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 30px;
        padding: 0 30px 30px;
        margin-top: -80px;
        position: relative;
        z-index: 2;
      }
 
      .modal-poster-wrap img {
        width: 100%;
        border-radius: 6px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        border: 2px solid rgba(255,255,255,0.08);
        display: block;
      }
 
      .modal-info { padding-top: 10px; }
 
      .modal-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.8rem;
        letter-spacing: 1.5px;
        line-height: 1;
        margin-bottom: 14px;
      }
 
      .modal-pills {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 18px;
        align-items: center;
      }
      .pill {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .pill-red { background: rgba(229,9,20,0.2); color: #ff6b6b; border: 1px solid rgba(229,9,20,0.3); }
      .pill-gray { background: rgba(255,255,255,0.08); color: #aaa; border: 1px solid rgba(255,255,255,0.1); }
      .pill-gold { background: rgba(245,197,24,0.15); color: var(--gold); border: 1px solid rgba(245,197,24,0.3); }
 
      .modal-rating-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }
      .stars-display { color: var(--gold); letter-spacing: 2px; font-size: 1rem; }
      .rating-num { font-weight: 700; font-size: 1.1rem; }
      .vote-count { color: var(--text-dim); font-size: 0.8rem; }
 
      .modal-desc {
        font-size: 0.95rem;
        line-height: 1.75;
        color: #bbb;
        margin-bottom: 24px;
        font-weight: 300;
      }
 
      .modal-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 24px;
      }
      .stat-box {
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 14px;
        text-align: center;
      }
      .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
      .stat-value { font-size: 1rem; font-weight: 700; color: var(--text); }
 
      .modal-cta {
        display: flex;
        gap: 12px;
      }
      .btn-modal-primary {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 28px;
        background: var(--red);
        color: #fff;
        border: none;
        border-radius: 5px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.9rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.3px;
      }
      .btn-modal-primary:hover { background: var(--red-dark); }
 
      .btn-modal-secondary {
        padding: 12px 22px;
        background: transparent;
        color: var(--text-muted);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 5px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .btn-modal-secondary:hover { border-color: rgba(255,255,255,0.35); color: var(--text); }
 
      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        .nav-search-wrap input { width: 140px; }
        .movies-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 4px; }
        .loading-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 4px; }
        .hero { height: 65vh; }
        .modal-body { grid-template-columns: 1fr; gap: 20px; padding: 0 20px 20px; margin-top: 0; }
        .modal-poster-wrap { display: none; }
        .modal-title { font-size: 2rem; }
        .modal-stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .tab-btn { padding: 16px 16px; font-size: 0.8rem; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🎬 CineStream</h1>
        <p>Jelajahi Dunia Sinema Modern</p>
      </header>

      <div class="search-section">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Cari film favorit Anda..."
        />
        <button class="btn-search" onclick="searchMovies()">🔍 Cari</button>
      </div>

      <div class="category-buttons">
        <button class="category-btn active" onclick="getPopularMovies()">
          🔥 Popular
        </button>
        <button class="category-btn" onclick="getTopRatedMovies()">
          ⭐ Top Rated
        </button>
        <button class="category-btn" onclick="getUpcomingMovies()">
          📅 Upcoming
        </button>
        <button class="category-btn" onclick="getNowPlayingMovies()">
          🎭 Now Playing
        </button>
      </div>

      <div id="errorMessage"></div>
      <div id="loading" class="loading" style="display: none">
        <div class="spinner"></div>
        <p>Memuat film-film terbaik...</p>
      </div>
      <div id="moviesContainer" class="movies-grid"></div>
      <div id="noResults" class="no-results" style="display: none">
        Tidak ada film yang ditemukan 😢
      </div>

      <div class="pagination">
        <button id="prevBtn" onclick="previousPage()" disabled>
          ← Sebelumnya
        </button>
        <span class="page-info" id="pageInfo"></span>
        <button id="nextBtn" onclick="nextPage()">Selanjutnya →</button>
      </div>
    </div>

    <!-- MODAL POPUP -->
    <div id="movieModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <img id="modalBackdrop" class="modal-backdrop" src="" alt="" />
          <img id="modalPoster" class="modal-poster" src="" alt="" />
          <span class="modal-close" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body">
          <h2 id="modalTitle" class="modal-title"></h2>

          <div class="modal-meta">
            <div class="meta-item">
              <span class="meta-label">Tahun:</span>
              <span class="meta-value" id="modalYear"></span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Status:</span>
              <span class="meta-value" id="modalStatus"></span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Bahasa:</span>
              <span class="meta-value" id="modalLanguage"></span>
            </div>
          </div>

          <div class="modal-rating">
            <div class="rating-stars" id="modalStars"></div>
            <span class="rating-text" id="modalRating"></span>
          </div>

          <div class="modal-description" id="modalDescription"></div>

          <div class="modal-details">
            <div class="detail-item">
              <div class="detail-label">🎯 Rating</div>
              <div class="detail-value" id="detailRating"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">📊 Popularitas</div>
              <div class="detail-value" id="detailPopularity"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">👁️ Votes</div>
              <div class="detail-value" id="detailVotes"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">💰 Budget</div>
              <div class="detail-value" id="detailBudget"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">💵 Revenue</div>
              <div class="detail-value" id="detailRevenue"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">⏱️ Durasi</div>
              <div class="detail-value" id="detailRuntime"></div>
            </div>
          </div>

          <div class="modal-buttons">
            <button class="btn-watch">▶️ Trailer</button>
            <button
              class="btn-watch"
              style="
                background: rgba(255, 255, 255, 0.1);
                color: #feca57;
                border: 2px solid #feca57;
              "
            >
              ❤️ Simpan
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_KEY = "fd7f506455249b75afa52c0b3908ab33";
      const BASE_URL = "https://api.themoviedb.org/3";
      const IMAGE_BASE_URL = "https://image.tmdb.org/t/p";

      let currentPage = 1;
      let currentQuery = "";
      let isSearching = false;
      let currentMovieData = null;

      document
        .getElementById("searchInput")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            searchMovies();
          }
        });

      async function fetchMovies(endpoint) {
        try {
          showLoading(true);
          hideError();

          const separator = endpoint.includes("?") ? "&" : "?";
          const url = `${BASE_URL}${endpoint}${separator}api_key=${API_KEY}&page=${currentPage}`;

          const response = await fetch(url);

          if (!response.ok) {
            if (response.status === 401) {
              throw new Error(
                "API Key tidak valid. Silakan cek kembali API key Anda.",
              );
            } else if (response.status === 404) {
              throw new Error("Data tidak ditemukan");
            } else {
              throw new Error(`Error: ${response.status}`);
            }
          }

          const data = await response.json();
          displayMovies(data.results);
          updatePageInfo(data.total_pages);
        } catch (error) {
          showError(error.message);
          console.error("Error:", error);
        } finally {
          showLoading(false);
        }
      }

      function searchMovies() {
        const query = document.getElementById("searchInput").value.trim();

        if (query === "") {
          showError("Silakan masukkan nama film");
          return;
        }

        currentQuery = query;
        isSearching = true;
        currentPage = 1;
        document.getElementById("searchInput").value = query;

        fetchMovies(`/search/movie?query=${encodeURIComponent(query)}`);
      }

      function getPopularMovies() {
        resetSearch();
        isSearching = false;
        fetchMovies("/movie/popular");
        updateActiveButton(event.target);
      }

      function getTopRatedMovies() {
        resetSearch();
        isSearching = false;
        fetchMovies("/movie/top_rated");
        updateActiveButton(event.target);
      }

      function getUpcomingMovies() {
        resetSearch();
        isSearching = false;
        fetchMovies("/movie/upcoming");
        updateActiveButton(event.target);
      }

      function getNowPlayingMovies() {
        resetSearch();
        isSearching = false;
        fetchMovies("/movie/now_playing");
        updateActiveButton(event.target);
      }

      function resetSearch() {
        currentPage = 1;
        currentQuery = "";
        document.getElementById("searchInput").value = "";
      }

      function displayMovies(movies) {
        const container = document.getElementById("moviesContainer");
        container.innerHTML = "";

        if (movies.length === 0) {
          document.getElementById("noResults").style.display = "block";
          document.getElementById("moviesContainer").style.display = "none";
          return;
        }

        document.getElementById("noResults").style.display = "none";
        document.getElementById("moviesContainer").style.display = "grid";

        movies.forEach((movie) => {
          const posterPath = movie.poster_path
            ? IMAGE_BASE_URL + "/w500" + movie.poster_path
            : "https://via.placeholder.com/500x750?text=No+Image";

          const releaseYear = movie.release_date
            ? new Date(movie.release_date).getFullYear()
            : "N/A";
          const rating = movie.vote_average
            ? movie.vote_average.toFixed(1)
            : "N/A";

          const movieCard = document.createElement("div");
          movieCard.className = "movie-card";
          movieCard.innerHTML = `
            <img src="${posterPath}" alt="${movie.title}" class="movie-poster">
            <div class="movie-info">
              <div class="movie-title">${movie.title}</div>
              <div class="movie-year">${releaseYear}</div>
              <div class="movie-rating">
                <span class="star">⭐</span>
                <span class="rating-value">${rating}</span>
                <span class="rating-max">/10</span>
              </div>
              <div class="movie-overview">${
                movie.overview || "Tidak ada deskripsi"
              }</div>
              <button class="view-btn" onclick="openModal(event)">Lihat Detail</button>
            </div>
          `;

          // Store movie data untuk modal
          movieCard.dataset.movieId = movie.id;
          movieCard.addEventListener("click", function (e) {
            if (!e.target.classList.contains("view-btn")) {
              openModal(e, movie);
            }
          });

          const btn = movieCard.querySelector(".view-btn");
          if (btn) {
            btn.addEventListener("click", (e) => {
              e.stopPropagation();
              openModal(e, movie);
            });
          }

          container.appendChild(movieCard);
        });

        // Add click to all cards
        document.querySelectorAll(".movie-card").forEach((card) => {
          card.addEventListener("click", function (e) {
            if (!e.target.classList.contains("view-btn")) {
              const id = this.dataset.movieId;
              getMovieDetails(id);
            }
          });
        });
      }

      async function getMovieDetails(movieId) {
        try {
          const response = await fetch(
            `${BASE_URL}/movie/${movieId}?api_key=${API_KEY}`,
          );
          const data = await response.json();
          displayMovieModal(data);
        } catch (error) {
          console.error("Error fetching details:", error);
        }
      }

      function displayMovieModal(movie) {
        // Set poster dan backdrop
        const posterPath = movie.poster_path
          ? IMAGE_BASE_URL + "/w500" + movie.poster_path
          : "https://via.placeholder.com/500x750?text=No+Image";

        const backdropPath = movie.backdrop_path
          ? IMAGE_BASE_URL + "/original" + movie.backdrop_path
          : "https://via.placeholder.com/1280x720?text=No+Image";

        document.getElementById("modalPoster").src = posterPath;
        document.getElementById("modalBackdrop").src = backdropPath;
        document.getElementById("modalTitle").textContent = movie.title;
        document.getElementById("modalYear").textContent = new Date(
          movie.release_date,
        ).getFullYear();
        document.getElementById("modalStatus").textContent =
          movie.status || "Released";
        document.getElementById("modalLanguage").textContent =
          movie.original_language.toUpperCase();

        // Rating stars
        const stars = Math.round(movie.vote_average / 2);
        let starsHTML = "";
        for (let i = 0; i < 5; i++) {
          starsHTML += i < stars ? "⭐" : "☆";
        }
        document.getElementById("modalStars").innerHTML = starsHTML;
        document.getElementById("modalRating").textContent =
          movie.vote_average.toFixed(1) + "/10";

        document.getElementById("modalDescription").textContent =
          movie.overview || "Tidak ada deskripsi";

        // Details
        document.getElementById("detailRating").textContent =
          movie.vote_average.toFixed(1) + "/10";
        document.getElementById("detailPopularity").textContent =
          movie.popularity.toFixed(0);
        document.getElementById("detailVotes").textContent = movie.vote_count;
        document.getElementById("detailBudget").textContent =
          movie.budget > 0
            ? "$" + movie.budget.toLocaleString()
            : "Tidak ada data";
        document.getElementById("detailRevenue").textContent =
          movie.revenue > 0
            ? "$" + movie.revenue.toLocaleString()
            : "Tidak ada data";
        document.getElementById("detailRuntime").textContent =
          movie.runtime + " menit";

        // Open modal
        document.getElementById("movieModal").classList.add("show");
      }

      function openModal(e, movie = null) {
        e?.stopPropagation?.();
        if (movie) {
          displayMovieModal(movie);
        }
      }

      function closeModal() {
        document.getElementById("movieModal").classList.remove("show");
      }

      // Close modal when clicking outside
      window.addEventListener("click", function (event) {
        const modal = document.getElementById("movieModal");
        if (event.target == modal) {
          closeModal();
        }
      });

      function showLoading(show) {
        document.getElementById("loading").style.display = show
          ? "block"
          : "none";
      }

      function showError(message) {
        const errorDiv = document.getElementById("errorMessage");
        errorDiv.innerHTML = `<div class="error-message">${message}</div>`;
      }

      function hideError() {
        document.getElementById("errorMessage").innerHTML = "";
      }

      function updatePageInfo(totalPages) {
        document.getElementById("pageInfo").textContent =
          `Halaman ${currentPage} / ${totalPages}`;
        document.getElementById("prevBtn").disabled = currentPage === 1;
        document.getElementById("nextBtn").disabled = currentPage >= totalPages;
      }

      function nextPage() {
        currentPage++;
        window.scrollTo(0, 0);
        if (isSearching) {
          fetchMovies(
            `/search/movie?query=${encodeURIComponent(currentQuery)}`,
          );
        } else {
          const activeBtn = document.querySelector(".category-btn.active");
          activeBtn.click();
        }
      }

      function previousPage() {
        if (currentPage > 1) {
          currentPage--;
          window.scrollTo(0, 0);
          if (isSearching) {
            fetchMovies(
              `/search/movie?query=${encodeURIComponent(currentQuery)}`,
            );
          } else {
            const activeBtn = document.querySelector(".category-btn.active");
            activeBtn.click();
          }
        }
      }

      function updateActiveButton(button) {
        document.querySelectorAll(".category-btn").forEach((btn) => {
          btn.classList.remove("active");
        });
        button.classList.add("active");
      }

      // Load popular movies on page load
      window.addEventListener("load", () => {
        const popularBtn = document.querySelector(
          '.category-btn[onclick="getPopularMovies()"]',
        );
        popularBtn.click();
      });
    </script>
  </body>
</html>
