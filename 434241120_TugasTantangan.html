<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineStream - Movie Database</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(
          135deg,
          #0f0c29 0%,
          #302b63 50%,
          #24243e 100%
        );
        min-height: 100vh;
        padding: 20px;
        color: #fff;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      /* ===== HEADER ===== */
      header {
        text-align: center;
        margin-bottom: 40px;
        padding: 30px 0;
        border-bottom: 3px solid rgba(255, 107, 107, 0.3);
      }

      header h1 {
        font-size: 3.5em;
        background: linear-gradient(135deg, #ff6b6b, #feca57);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 10px;
        letter-spacing: 2px;
        font-weight: 800;
      }

      header p {
        font-size: 1.1em;
        color: #bbb;
        font-weight: 300;
      }

      /* ===== SEARCH & FILTER SECTION ===== */
      .search-section {
        display: flex;
        gap: 15px;
        margin-bottom: 35px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .search-input {
        padding: 15px 25px;
        border: 2px solid rgba(255, 107, 107, 0.5);
        border-radius: 50px;
        width: 100%;
        max-width: 450px;
        font-size: 1em;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
      }

      .search-input::placeholder {
        color: rgba(255, 255, 255, 0.6);
      }

      .search-input:focus {
        outline: none;
        border-color: #ff6b6b;
        background: rgba(255, 107, 107, 0.15);
        box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
      }

      .btn-search {
        padding: 15px 40px;
        background: linear-gradient(135deg, #ff6b6b, #ff5252);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 1em;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
      }

      .btn-search:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(255, 107, 107, 0.6);
      }

      /* ===== CATEGORY BUTTONS ===== */
      .category-buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-bottom: 35px;
        flex-wrap: wrap;
      }

      .category-btn {
        padding: 12px 28px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 30px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
      }

      .category-btn:hover {
        background: rgba(255, 107, 107, 0.2);
        border-color: #ff6b6b;
        transform: translateY(-2px);
      }

      .category-btn.active {
        background: linear-gradient(135deg, #ff6b6b, #ff5252);
        border-color: #ff6b6b;
        box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
      }

      /* ===== MOVIES GRID ===== */
      .movies-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 30px;
        margin-bottom: 40px;
      }

      .movie-card {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 15px;
        overflow: hidden;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        position: relative;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .movie-card:hover {
        transform: translateY(-15px) scale(1.02);
        box-shadow: 0 20px 50px rgba(255, 107, 107, 0.3);
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 107, 107, 0.5);
      }

      .movie-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.3);
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: 2;
      }

      .movie-card:hover::before {
        opacity: 1;
      }

      .movie-poster {
        width: 100%;
        height: 320px;
        object-fit: cover;
        background-color: #1a1a2e;
        display: block;
      }

      .movie-info {
        padding: 20px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
      }

      .movie-title {
        font-size: 1.15em;
        font-weight: 700;
        margin-bottom: 12px;
        color: #fff;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .movie-year {
        color: #feca57;
        font-size: 0.9em;
        margin-bottom: 12px;
        font-weight: 600;
      }

      .movie-rating {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }

      .star {
        color: #feca57;
        font-size: 1.2em;
      }

      .rating-value {
        color: #fff;
        font-weight: bold;
        font-size: 1em;
      }

      .rating-max {
        color: #888;
        font-size: 0.9em;
      }

      .movie-overview {
        font-size: 0.85em;
        color: #bbb;
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-top: auto;
      }

      .view-btn {
        margin-top: 15px;
        padding: 10px;
        background: rgba(255, 107, 107, 0.3);
        border: 1px solid #ff6b6b;
        color: #ff6b6b;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        font-size: 0.9em;
      }

      .view-btn:hover {
        background: rgba(255, 107, 107, 0.5);
        color: white;
      }

      /* ===== MODAL/POPUP ===== */
      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(5px);
        animation: fadeIn 0.3s ease;
        align-items: center;
        justify-content: center;
      }

      .modal.show {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal-content {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        padding: 0;
        border-radius: 20px;
        border: 2px solid rgba(255, 107, 107, 0.3);
        max-width: 1000px;
        width: 95%;
        max-height: 85vh;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        animation: slideUp 0.4s ease;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
      }

      @keyframes slideUp {
        from {
          transform: translateY(100px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .modal-header {
        position: relative;
        height: 450px;
        overflow: visible;
        flex-shrink: 0;
      }

      .modal-backdrop {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: brightness(0.7);
      }

      .modal-close {
        position: absolute;
        top: 20px;
        right: 20px;
        font-size: 35px;
        font-weight: bold;
        color: white;
        cursor: pointer;
        background: rgba(0, 0, 0, 0.6);
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        z-index: 10;
      }

      .modal-close:hover {
        background: #ff6b6b;
        transform: rotate(90deg);
      }

      .modal-poster {
        position: absolute;
        bottom: 20px;
        left: 40px;
        width: 220px;
        height: 330px;
        object-fit: cover;
        border-radius: 15px;
        border: 5px solid white;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        z-index: 5;
      }

      .modal-body {
        padding: 50px 30px 30px 300px;
        flex-grow: 1;
        overflow-y: auto;
      }

      .modal-title {
        font-size: 2.5em;
        font-weight: 800;
        margin-bottom: 15px;
        background: linear-gradient(135deg, #ff6b6b, #feca57);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .modal-meta {
        display: flex;
        gap: 25px;
        margin-bottom: 25px;
        flex-wrap: wrap;
        font-size: 1em;
      }

      .meta-item {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .meta-label {
        color: #feca57;
        font-weight: 700;
      }

      .meta-value {
        color: #ddd;
      }

      .modal-rating {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 25px;
      }

      .rating-stars {
        display: flex;
        gap: 3px;
      }

      .rating-stars span {
        color: #feca57;
        font-size: 1.3em;
      }

      .rating-text {
        color: #bbb;
        font-weight: 600;
      }

      .modal-description {
        color: #ddd;
        line-height: 1.8;
        margin-bottom: 25px;
        font-size: 1.05em;
      }

      .modal-details {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 25px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        border: 1px solid rgba(255, 107, 107, 0.2);
      }

      .detail-item {
        padding: 10px 0;
      }

      .detail-label {
        color: #feca57;
        font-size: 0.9em;
        font-weight: 700;
        margin-bottom: 5px;
      }

      .detail-value {
        color: #ddd;
        font-size: 1em;
      }

      .modal-buttons {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
      }

      .btn-watch {
        padding: 15px 40px;
        background: linear-gradient(135deg, #ff6b6b, #ff5252);
        color: white;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        font-weight: 700;
        font-size: 1em;
        transition: all 0.3s ease;
        box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
      }

      .btn-watch:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(255, 107, 107, 0.6);
      }

      /* ===== LOADING & STATES ===== */
      .loading {
        text-align: center;
        color: white;
        font-size: 1.5em;
        padding: 80px 20px;
      }

      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top: 4px solid #ff6b6b;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .error-message {
        background: linear-gradient(135deg, #ff6b6b, #ff5252);
        color: white;
        padding: 20px 25px;
        border-radius: 15px;
        margin-bottom: 25px;
        text-align: center;
        font-weight: 600;
        border-left: 5px solid #feca57;
      }

      .no-results {
        text-align: center;
        color: #bbb;
        font-size: 1.3em;
        padding: 60px 20px;
      }

      /* ===== PAGINATION ===== */
      .pagination {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 40px;
        flex-wrap: wrap;
      }

      .pagination button {
        padding: 12px 25px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 25px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
      }

      .pagination button:hover:not(:disabled) {
        background: rgba(255, 107, 107, 0.2);
        border-color: #ff6b6b;
        transform: translateY(-2px);
      }

      .pagination button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .page-info {
        color: #feca57;
        font-weight: 700;
        font-size: 1.05em;
        align-self: center;
      }

      /* ===== API NOTE ===== */
      .api-note {
        background: rgba(254, 202, 87, 0.15);
        color: #feca57;
        padding: 18px 25px;
        border-radius: 15px;
        margin-bottom: 30px;
        font-size: 0.95em;
        border: 2px solid #feca57;
      }

      .api-note strong {
        color: #feca57;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 768px) {
        header h1 {
          font-size: 2.5em;
        }

        .movies-grid {
          grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
          gap: 20px;
        }

        .modal-content {
          max-width: 95vw;
          flex-direction: column;
        }

        .modal-header {
          height: 300px;
        }

        .modal-body {
          padding: 20px;
        }

        .modal-poster {
          width: 150px;
          height: 225px;
          bottom: 15px;
          left: 20px;
        }

        .modal-title {
          font-size: 1.8em;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🎬 CineStream</h1>
        <p>Jelajahi Dunia Sinema Modern</p>
      </header>

      <div class="search-section">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Cari film favorit Anda..."
        />
        <button class="btn-search" onclick="searchMovies()">🔍 Cari</button>
      </div>

      <div class="category-buttons">
        <button class="category-btn active" onclick="getPopularMovies()">
          🔥 Popular
        </button>
        <button class="category-btn" onclick="getTopRatedMovies()">
          ⭐ Top Rated
        </button>
        <button class="category-btn" onclick="getUpcomingMovies()">
          📅 Upcoming
        </button>
        <button class="category-btn" onclick="getNowPlayingMovies()">
          🎭 Now Playing
        </button>
      </div>

      <div id="errorMessage"></div>
      <div id="loading" class="loading" style="display: none">
        <div class="spinner"></div>
        <p>Memuat film-film terbaik...</p>
      </div>
      <div id="moviesContainer" class="movies-grid"></div>
      <div id="noResults" class="no-results" style="display: none">
        Tidak ada film yang ditemukan 😢
      </div>

      <div class="pagination">
        <button id="prevBtn" onclick="previousPage()" disabled>
          ← Sebelumnya
        </button>
        <span class="page-info" id="pageInfo"></span>
        <button id="nextBtn" onclick="nextPage()">Selanjutnya →</button>
      </div>
    </div>

    <!-- MODAL POPUP -->
    <div id="movieModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <img id="modalBackdrop" class="modal-backdrop" src="" alt="" />
          <img id="modalPoster" class="modal-poster" src="" alt="" />
          <span class="modal-close" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body">
          <h2 id="modalTitle" class="modal-title"></h2>

          <div class="modal-meta">
            <div class="meta-item">
              <span class="meta-label">Tahun:</span>
              <span class="meta-value" id="modalYear"></span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Status:</span>
              <span class="meta-value" id="modalStatus"></span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Bahasa:</span>
              <span class="meta-value" id="modalLanguage"></span>
            </div>
          </div>

          <div class="modal-rating">
            <div class="rating-stars" id="modalStars"></div>
            <span class="rating-text" id="modalRating"></span>
          </div>

          <div class="modal-description" id="modalDescription"></div>

          <div class="modal-details">
            <div class="detail-item">
              <div class="detail-label">🎯 Rating</div>
              <div class="detail-value" id="detailRating"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">📊 Popularitas</div>
              <div class="detail-value" id="detailPopularity"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">👁️ Votes</div>
              <div class="detail-value" id="detailVotes"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">💰 Budget</div>
              <div class="detail-value" id="detailBudget"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">💵 Revenue</div>
              <div class="detail-value" id="detailRevenue"></div>
            </div>
            <div class="detail-item">
              <div class="detail-label">⏱️ Durasi</div>
              <div class="detail-value" id="detailRuntime"></div>
            </div>
          </div>

          <div class="modal-buttons">
            <button class="btn-watch">▶️ Trailer</button>
            <button
              class="btn-watch"
              style="
                background: rgba(255, 255, 255, 0.1);
                color: #feca57;
                border: 2px solid #feca57;
              "
            >
              ❤️ Simpan
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_KEY = "9c1b336939c3e7529a33392ea789477b";
      const BASE_URL = "https://api.themoviedb.org/3";
      const IMAGE_BASE_URL = "https://image.tmdb.org/t/p";

      let currentPage = 1;
      let currentQuery = "";
      let isSearching = false;
      let currentMovieData = null;

      document
        .getElementById("searchInput")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            searchMovies();
          }
        });

      async function fetchMovies(endpoint) {
        try {
          showLoading(true);
          hideError();

          const separator = endpoint.includes("?") ? "&" : "?";
          const url = `${BASE_URL}${endpoint}${separator}api_key=${API_KEY}&page=${currentPage}`;

          const response = await fetch(url);

          if (!response.ok) {
            if (response.status === 401) {
              throw new Error(
                "API Key tidak valid. Silakan cek kembali API key Anda.",
              );
            } else if (response.status === 404) {
              throw new Error("Data tidak ditemukan");
            } else {
              throw new Error(`Error: ${response.status}`);
            }
          }

          const data = await response.json();
          displayMovies(data.results);
          updatePageInfo(data.total_pages);
        } catch (error) {
          showError(error.message);
          console.error("Error:", error);
        } finally {
          showLoading(false);
        }
      }

      function searchMovies() {
        const query = document.getElementById("searchInput").value.trim();

        if (query === "") {
          showError("Silakan masukkan nama film");
          return;
        }

        currentQuery = query;
        isSearching = true;
        currentPage = 1;
        document.getElementById("searchInput").value = query;

        fetchMovies(`/search/movie?query=${encodeURIComponent(query)}`);
      }

      function getPopularMovies() {
        resetSearch();
        isSearching = false;
        fetchMovies("/movie/popular");
        updateActiveButton(event.target);
      }

      function getTopRatedMovies() {
        resetSearch();
        isSearching = false;
        fetchMovies("/movie/top_rated");
        updateActiveButton(event.target);
      }

      function getUpcomingMovies() {
        resetSearch();
        isSearching = false;
        fetchMovies("/movie/upcoming");
        updateActiveButton(event.target);
      }

      function getNowPlayingMovies() {
        resetSearch();
        isSearching = false;
        fetchMovies("/movie/now_playing");
        updateActiveButton(event.target);
      }

      function resetSearch() {
        currentPage = 1;
        currentQuery = "";
        document.getElementById("searchInput").value = "";
      }

      function displayMovies(movies) {
        const container = document.getElementById("moviesContainer");
        container.innerHTML = "";

        if (movies.length === 0) {
          document.getElementById("noResults").style.display = "block";
          document.getElementById("moviesContainer").style.display = "none";
          return;
        }

        document.getElementById("noResults").style.display = "none";
        document.getElementById("moviesContainer").style.display = "grid";

        movies.forEach((movie) => {
          const posterPath = movie.poster_path
            ? IMAGE_BASE_URL + "/w500" + movie.poster_path
            : "https://via.placeholder.com/500x750?text=No+Image";

          const releaseYear = movie.release_date
            ? new Date(movie.release_date).getFullYear()
            : "N/A";
          const rating = movie.vote_average
            ? movie.vote_average.toFixed(1)
            : "N/A";

          const movieCard = document.createElement("div");
          movieCard.className = "movie-card";
          movieCard.innerHTML = `
            <img src="${posterPath}" alt="${movie.title}" class="movie-poster">
            <div class="movie-info">
              <div class="movie-title">${movie.title}</div>
              <div class="movie-year">${releaseYear}</div>
              <div class="movie-rating">
                <span class="star">⭐</span>
                <span class="rating-value">${rating}</span>
                <span class="rating-max">/10</span>
              </div>
              <div class="movie-overview">${
                movie.overview || "Tidak ada deskripsi"
              }</div>
              <button class="view-btn" onclick="openModal(event)">Lihat Detail</button>
            </div>
          `;

          // Store movie data untuk modal
          movieCard.dataset.movieId = movie.id;
          movieCard.addEventListener("click", function (e) {
            if (!e.target.classList.contains("view-btn")) {
              openModal(e, movie);
            }
          });

          const btn = movieCard.querySelector(".view-btn");
          if (btn) {
            btn.addEventListener("click", (e) => {
              e.stopPropagation();
              openModal(e, movie);
            });
          }

          container.appendChild(movieCard);
        });

        // Add click to all cards
        document.querySelectorAll(".movie-card").forEach((card) => {
          card.addEventListener("click", function (e) {
            if (!e.target.classList.contains("view-btn")) {
              const id = this.dataset.movieId;
              getMovieDetails(id);
            }
          });
        });
      }

      async function getMovieDetails(movieId) {
        try {
          const response = await fetch(
            `${BASE_URL}/movie/${movieId}?api_key=${API_KEY}`,
          );
          const data = await response.json();
          displayMovieModal(data);
        } catch (error) {
          console.error("Error fetching details:", error);
        }
      }

      function displayMovieModal(movie) {
        // Set poster dan backdrop
        const posterPath = movie.poster_path
          ? IMAGE_BASE_URL + "/w500" + movie.poster_path
          : "https://via.placeholder.com/500x750?text=No+Image";

        const backdropPath = movie.backdrop_path
          ? IMAGE_BASE_URL + "/original" + movie.backdrop_path
          : "https://via.placeholder.com/1280x720?text=No+Image";

        document.getElementById("modalPoster").src = posterPath;
        document.getElementById("modalBackdrop").src = backdropPath;
        document.getElementById("modalTitle").textContent = movie.title;
        document.getElementById("modalYear").textContent = new Date(
          movie.release_date,
        ).getFullYear();
        document.getElementById("modalStatus").textContent =
          movie.status || "Released";
        document.getElementById("modalLanguage").textContent =
          movie.original_language.toUpperCase();

        // Rating stars
        const stars = Math.round(movie.vote_average / 2);
        let starsHTML = "";
        for (let i = 0; i < 5; i++) {
          starsHTML += i < stars ? "⭐" : "☆";
        }
        document.getElementById("modalStars").innerHTML = starsHTML;
        document.getElementById("modalRating").textContent =
          movie.vote_average.toFixed(1) + "/10";

        document.getElementById("modalDescription").textContent =
          movie.overview || "Tidak ada deskripsi";

        // Details
        document.getElementById("detailRating").textContent =
          movie.vote_average.toFixed(1) + "/10";
        document.getElementById("detailPopularity").textContent =
          movie.popularity.toFixed(0);
        document.getElementById("detailVotes").textContent = movie.vote_count;
        document.getElementById("detailBudget").textContent =
          movie.budget > 0
            ? "$" + movie.budget.toLocaleString()
            : "Tidak ada data";
        document.getElementById("detailRevenue").textContent =
          movie.revenue > 0
            ? "$" + movie.revenue.toLocaleString()
            : "Tidak ada data";
        document.getElementById("detailRuntime").textContent =
          movie.runtime + " menit";

        // Open modal
        document.getElementById("movieModal").classList.add("show");
      }

      function openModal(e, movie = null) {
        e?.stopPropagation?.();
        if (movie) {
          displayMovieModal(movie);
        }
      }

      function closeModal() {
        document.getElementById("movieModal").classList.remove("show");
      }

      // Close modal when clicking outside
      window.addEventListener("click", function (event) {
        const modal = document.getElementById("movieModal");
        if (event.target == modal) {
          closeModal();
        }
      });

      function showLoading(show) {
        document.getElementById("loading").style.display = show
          ? "block"
          : "none";
      }

      function showError(message) {
        const errorDiv = document.getElementById("errorMessage");
        errorDiv.innerHTML = `<div class="error-message">${message}</div>`;
      }

      function hideError() {
        document.getElementById("errorMessage").innerHTML = "";
      }

      function updatePageInfo(totalPages) {
        document.getElementById("pageInfo").textContent =
          `Halaman ${currentPage} / ${totalPages}`;
        document.getElementById("prevBtn").disabled = currentPage === 1;
        document.getElementById("nextBtn").disabled = currentPage >= totalPages;
      }

      function nextPage() {
        currentPage++;
        window.scrollTo(0, 0);
        if (isSearching) {
          fetchMovies(
            `/search/movie?query=${encodeURIComponent(currentQuery)}`,
          );
        } else {
          const activeBtn = document.querySelector(".category-btn.active");
          activeBtn.click();
        }
      }

      function previousPage() {
        if (currentPage > 1) {
          currentPage--;
          window.scrollTo(0, 0);
          if (isSearching) {
            fetchMovies(
              `/search/movie?query=${encodeURIComponent(currentQuery)}`,
            );
          } else {
            const activeBtn = document.querySelector(".category-btn.active");
            activeBtn.click();
          }
        }
      }

      function updateActiveButton(button) {
        document.querySelectorAll(".category-btn").forEach((btn) => {
          btn.classList.remove("active");
        });
        button.classList.add("active");
      }

      // Load popular movies on page load
      window.addEventListener("load", () => {
        const popularBtn = document.querySelector(
          '.category-btn[onclick="getPopularMovies()"]',
        );
        popularBtn.click();
      });
    </script>
  </body>
</html>
